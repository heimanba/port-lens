name: CI

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

      - name: cargo build (release)
        run: cargo build --release --all-targets

  release-build:
    name: Release archive (${{ matrix.os }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release
        env:
          PORT_LENS_VERSION: ${{ github.ref_name }}
        run: cargo build --release

      - name: Create archive
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p "pack/port-lens-${VERSION}"
          cp target/release/ports "pack/port-lens-${VERSION}/"
          OS_LOWER=$(echo "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')
          ARCH_LOWER=$(echo "${RUNNER_ARCH}" | tr '[:upper:]' '[:lower:]')
          NAME="port-lens-${VERSION}-${OS_LOWER}-${ARCH_LOWER}"
          tar czf "${NAME}.tar.gz" -C pack "port-lens-${VERSION}"
          echo "archive=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ runner.os }}-${{ runner.arch }}
          path: ${{ steps.pack.outputs.archive }}

  release-publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
